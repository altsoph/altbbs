<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>altBBS // CRT</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --ph: #3aff6e; --ph-dim: #1d5c32; --bg: #030503; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); overflow:hidden;
               font-family: "Cascadia Mono","IBM Plex Mono",Consolas,Menlo,monospace; }
  #bezel { position:fixed; inset:0; display:flex; flex-direction:column;
           background: radial-gradient(ellipse 120% 100% at 50% 40%, #071307 0%, #020402 78%, #000 100%);
           border-radius: 18px; }
  #crt { flex:1; overflow-y:auto; padding:12px 8px 4px; -webkit-overflow-scrolling:touch; }
  #screen { margin:0; font-family:inherit; font-size:13px; line-height:1.28;
            color:var(--ph); white-space:pre;
            text-shadow: 0 0 4px rgba(58,255,110,.55), 0 0 14px rgba(58,255,110,.22);
            transition: opacity .06s; }
  #screen.flick { opacity:.25; }
  #ruler { position:absolute; left:-9999px; top:0; margin:0;
           font-family:inherit; white-space:pre; visibility:hidden; }
  /* scanlines + vignette + slow flicker */
  #fx { pointer-events:none; position:fixed; inset:0; border-radius:18px;
        background:
          repeating-linear-gradient(0deg, rgba(0,0,0,.25) 0 1px, transparent 1px 3px),
          radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,.6) 100%); }
  #fx::after { content:""; position:absolute; inset:0;
        background: rgba(140,255,170,.035); animation: flicker 5s infinite; }
  @keyframes flicker { 0%,100%{opacity:1} 90%{opacity:1} 91%{opacity:.4}
                       92%{opacity:1} 96%{opacity:.7} 97%{opacity:1} }
  #keys { display:flex; flex-wrap:wrap; gap:5px; padding:6px 8px; }
  #keys button { background:#04170a; border:1px solid var(--ph-dim); color:var(--ph);
        font: 11px/1 inherit; padding:8px 9px; border-radius:3px; cursor:pointer;
        text-shadow: 0 0 4px rgba(58,255,110,.5); }
  #keys button:active { background:#0d3a1c; }
  #inbar { display:flex; gap:6px; padding:6px 8px calc(8px + env(safe-area-inset-bottom)); }
  #in { flex:1; min-width:0; background:rgba(2,18,6,.7); border:1px solid var(--ph-dim);
        color:var(--ph); font: 14px inherit; padding:9px; border-radius:3px; outline:none;
        text-shadow: 0 0 4px rgba(58,255,110,.5); caret-color: var(--ph); }
  #in::placeholder { color:#1f7a3d; }
  #send { background:#04170a; border:1px solid var(--ph-dim); color:var(--ph);
        font: 12px inherit; padding:9px 12px; border-radius:3px; cursor:pointer; }
  .boot { animation: bootin .8s steps(12) both; }
  @keyframes bootin { from { clip-path: inset(0 0 100% 0); } to { clip-path: inset(0); } }
</style>
</head>
<body>
<div id="bezel">
  <div id="crt"><pre id="screen" class="boot">
   ATDT ALTBBS
   CONNECT 14400/ARQ

   dialing the tower...
</pre><pre id="ruler" aria-hidden="true"></pre></div>
  <div id="keys"></div>
  <div id="inbar">
    <input id="in" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="hotkey or text + enter">
    <button id="send">SEND</button>
  </div>
</div>
<div id="fx"></div>
<script>
(function () {
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  var dev = new URLSearchParams(location.search).get("dev");
  var wsurl = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";
  var ws = null, backoff = 1500;

  function el(id) { return document.getElementById(id); }
  function fit() {
    // scale the font so the widest screen line fills the CRT width
    var scr = el("screen"), crt = el("crt"), ruler = el("ruler");
    var cols = 34;
    (scr.textContent || "").split("\n").forEach(function (l) {
      if (l.length > cols) cols = l.length;
    });
    ruler.style.fontSize = "100px";
    ruler.textContent = Array(51).join("X");
    var cw = ruler.getBoundingClientRect().width / 50;  // px/char @100px
    ruler.textContent = "";
    var avail = crt.clientWidth - 20;
    var fs = Math.floor(100 * avail / (cols * cw));
    scr.style.fontSize = Math.max(9, Math.min(fs, 30)) + "px";
  }
  var fitTimer = null;
  window.addEventListener("resize", function () {
    clearTimeout(fitTimer); fitTimer = setTimeout(fit, 120);
  });
  function setScreen(html) {
    var scr = el("screen");
    scr.classList.add("flick");
    setTimeout(function () {
      var wrap = document.createElement("div");
      wrap.innerHTML = html;
      var pre = wrap.querySelector("pre") || wrap;
      scr.textContent = "";
      scr.innerHTML = pre.innerHTML;
      scr.classList.remove("flick");
      fit();
      el("crt").scrollTop = 0;
    }, 60);
  }
  function setKeys(rows) {
    var k = el("keys");
    k.innerHTML = "";
    (rows || []).forEach(function (row) {
      row.forEach(function (b) {
        var btn = document.createElement("button");
        btn.textContent = b.label;
        btn.onclick = function () { send({ data: b.data }); };
        k.appendChild(btn);
      });
    });
  }
  function send(obj) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
  }
  function connect() {
    ws = new WebSocket(wsurl);
    ws.onopen = function () {
      backoff = 1500;
      ws.send(JSON.stringify({ auth: (tg && tg.initData) || "", dev: dev }));
    };
    ws.onmessage = function (ev) {
      var m; try { m = JSON.parse(ev.data); } catch (e) { return; }
      if (m.error) { setScreen("<pre>\n   NO CARRIER\n\n   " + m.error + "</pre>"); setKeys([]); return; }
      if (m.screen) setScreen(m.screen);
      setKeys(m.buttons);
    };
    ws.onclose = function () {
      setKeys([]);
      el("screen").innerHTML += "\n   +++ NO CARRIER (redialing...)";
      setTimeout(connect, backoff);
      backoff = Math.min(backoff * 2, 15000);
    };
  }
  function submit() {
    var box = el("in"), v = box.value.trim();
    if (!v) return;
    send({ text: v });
    box.value = "";
  }
  el("send").onclick = submit;
  el("in").addEventListener("keydown", function (e) {
    if (e.key === "Enter") { e.preventDefault(); submit(); }
  });
  document.addEventListener("keydown", function (e) {
    if (document.activeElement !== el("in") && e.key.length === 1) el("in").focus();
  });
  fit();
  connect();
})();
</script>
</body>
</html>
