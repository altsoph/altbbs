<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>altBBS // CRT</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --ph: #3aff6e; --ph-dim: #1d5c32; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:#000; overflow:hidden;
               font-family: "Cascadia Mono","IBM Plex Mono",Consolas,Menlo,monospace; }
  #bezel { position:fixed; inset:0; display:flex; flex-direction:column; background:#000; }
  #crt { flex:1; overflow-y:auto; padding:4px; -webkit-overflow-scrolling:touch;
         display:flex; justify-content:center; align-items:flex-start; }
  #gl { display:block; }
  /* fallback path (no WebGL): plain pre + css overlay */
  #screen { display:none; margin:0; font-family:inherit; font-size:13px; line-height:1.28;
            color:var(--ph); white-space:pre;
            text-shadow: 0 0 4px rgba(58,255,110,.55), 0 0 14px rgba(58,255,110,.22); }
  #ruler { position:absolute; left:-9999px; top:0; margin:0;
           font-family:inherit; white-space:pre; visibility:hidden; }
  #fx { display:none; pointer-events:none; position:fixed; inset:0;
        background:
          repeating-linear-gradient(0deg, rgba(0,0,0,.25) 0 1px, transparent 1px 3px),
          radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,.6) 100%); }
  body.nogl #screen { display:block; }
  body.nogl #fx { display:block; }
  body.nogl #gl { display:none; }
  #keys { display:flex; flex-wrap:wrap; gap:5px; padding:6px 8px; }
  #keys button { background:#04170a; border:1px solid var(--ph-dim); color:var(--ph);
        font: 11px/1 inherit; padding:8px 9px; border-radius:3px; cursor:pointer;
        text-shadow: 0 0 4px rgba(58,255,110,.5); }
  #keys button:active { background:#0d3a1c; }
  #inbar { display:flex; gap:6px; padding:6px 8px calc(8px + env(safe-area-inset-bottom)); }
  #in { flex:1; min-width:0; background:rgba(2,18,6,.7); border:1px solid var(--ph-dim);
        color:var(--ph); font: 14px inherit; padding:9px; border-radius:3px; outline:none;
        text-shadow: 0 0 4px rgba(58,255,110,.5); caret-color: var(--ph); }
  #in::placeholder { color:#1f7a3d; }
  #send { background:#04170a; border:1px solid var(--ph-dim); color:var(--ph);
        font: 12px inherit; padding:9px 12px; border-radius:3px; cursor:pointer; }
</style>
</head>
<body>
<div id="bezel">
  <div id="crt">
    <canvas id="gl"></canvas>
    <pre id="screen"></pre>
    <pre id="ruler" aria-hidden="true"></pre>
  </div>
  <div id="keys"></div>
  <div id="inbar">
    <input id="in" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="hotkey or text + enter">
    <button id="send">SEND</button>
  </div>
</div>
<div id="fx"></div>
<script>
(function () {
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  var dev = new URLSearchParams(location.search).get("dev");
  var wsurl = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";
  var ws = null, backoff = 1500;

  function el(id) { return document.getElementById(id); }

  /* ================= CRT renderer =====================================
     Text is drawn to an offscreen 2D canvas, which feeds a WebGL CRT
     shader: curvature, scanlines, bloom, rgb shift, vignette, flicker.
     Shader adapted from github.com/gingerbeardman/webgl-crt-shader (MIT).
  ===================================================================== */
  var FRAG = [
    "precision mediump float;",
    "uniform sampler2D tDiffuse;",
    "uniform float scanlineIntensity, scanlineCount, time, brightness,",
    "  contrast, saturation, bloomIntensity, bloomThreshold, rgbShift,",
    "  adaptiveIntensity, vignetteStrength, curvature, flickerStrength;",
    "varying vec2 vUv;",
    "const float PI = 3.14159265;",
    "const vec3 LUMA = vec3(0.299, 0.587, 0.114);",
    "vec2 curveRemapUV(vec2 uv, float c) {",
    "  vec2 xy = uv * 2.0 - 1.0;",
    "  float d = dot(xy, xy);",
    "  xy = xy * (1.0 + d * c * 0.25);",
    "  return xy * 0.5 + 0.5;",
    "}",
    "vec4 sampleBloom(sampler2D t, vec2 uv, float r, vec4 c0) {",
    "  vec4 c = c0 * 0.4;",
    "  c += (texture2D(t, uv + vec2(r, 0.)) + texture2D(t, uv - vec2(r, 0.))",
    "      + texture2D(t, uv + vec2(0., r)) + texture2D(t, uv - vec2(0., r))) * 0.15;",
    "  return c;",
    "}",
    "float vignetteApprox(vec2 uv, float s) {",
    "  vec2 v = uv * 2.0 - 1.0;",
    "  float d = max(abs(v.x), abs(v.y));",
    "  return 1.0 - d * d * s;",
    "}",
    "void main() {",
    "  vec2 uv = vUv;",
    "  if (curvature > 0.001) {",
    "    uv = curveRemapUV(uv, curvature);",
    "    if (uv.x < 0. || uv.x > 1. || uv.y < 0. || uv.y > 1.) {",
    "      gl_FragColor = vec4(0., 0., 0., 1.); return;",
    "    }",
    "  }",
    "  vec4 pixel = texture2D(tDiffuse, uv);",
    "  if (bloomIntensity > 0.001) {",
    "    float pl = dot(pixel.rgb, LUMA);",
    "    if (pl > bloomThreshold * 0.5) {",
    "      vec4 b = sampleBloom(tDiffuse, uv, 0.005, pixel);",
    "      b.rgb *= brightness;",
    "      float bl = dot(b.rgb, LUMA);",
    "      pixel.rgb += b.rgb * (bloomIntensity * max(0., (bl - bloomThreshold) * 1.5));",
    "    }",
    "  }",
    "  if (rgbShift > 0.005) {",
    "    float sh = rgbShift * 0.005;",
    "    pixel.r += texture2D(tDiffuse, vec2(uv.x + sh, uv.y)).r * 0.08;",
    "    pixel.b += texture2D(tDiffuse, vec2(uv.x - sh, uv.y)).b * 0.08;",
    "  }",
    "  pixel.rgb *= brightness;",
    "  float lum = dot(pixel.rgb, LUMA);",
    "  pixel.rgb = (pixel.rgb - 0.5) * contrast + 0.5;",
    "  pixel.rgb = mix(vec3(lum), pixel.rgb, saturation);",
    "  float mask = 1.0;",
    "  if (scanlineIntensity > 0.001) {",
    "    float sp = abs(sin(uv.y * scanlineCount * PI));",
    "    float af = 1.0 - (sin(uv.y * 30.0) * 0.5 + 0.5) * adaptiveIntensity * 0.2;",
    "    mask *= 1.0 - sp * scanlineIntensity * af;",
    "  }",
    "  if (flickerStrength > 0.001) mask *= 1.0 + sin(time * 110.0) * flickerStrength;",
    "  if (vignetteStrength > 0.001) mask *= vignetteApprox(uv, vignetteStrength);",
    "  pixel.rgb *= mask;",
    "  gl_FragColor = vec4(pixel.rgb, 1.0);",
    "}"].join("\n");
  var VERT =
    "attribute vec2 aPos; varying vec2 vUv;" +
    "void main(){ vUv = vec2(aPos.x*0.5+0.5, 0.5-aPos.y*0.5);" +
    "  gl_Position = vec4(aPos, 0., 1.); }";

  var TUNE = { scanlineIntensity: 0.22, brightness: 1.15, contrast: 1.05,
               saturation: 1.1, bloomIntensity: 0.35, bloomThreshold: 0.4,
               rgbShift: 0.35, adaptiveIntensity: 0.5, vignetteStrength: 0.32,
               curvature: 0.16, flickerStrength: 0.012 };

  var txt = document.createElement("canvas");
  var tctx = txt.getContext("2d");
  var lastText = "";
  var GL = (function () {
    var c = el("gl");
    var gl = c.getContext("webgl", { antialias: false, premultipliedAlpha: false })
          || c.getContext("experimental-webgl");
    if (!gl) return null;
    function sh(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s)); return null;
      }
      return s;
    }
    var vs = sh(gl.VERTEX_SHADER, VERT), fs = sh(gl.FRAGMENT_SHADER, FRAG);
    if (!vs || !fs) return null;
    var pr = gl.createProgram();
    gl.attachShader(pr, vs); gl.attachShader(pr, fs); gl.linkProgram(pr);
    if (!gl.getProgramParameter(pr, gl.LINK_STATUS)) return null;
    gl.useProgram(pr);
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER,
      new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(pr, "aPos");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    var tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    var U = {};
    ["tDiffuse", "scanlineIntensity", "scanlineCount", "time", "brightness",
     "contrast", "saturation", "bloomIntensity", "bloomThreshold", "rgbShift",
     "adaptiveIntensity", "vignetteStrength", "curvature", "flickerStrength"
    ].forEach(function (n) { U[n] = gl.getUniformLocation(pr, n); });
    Object.keys(TUNE).forEach(function (k) { gl.uniform1f(U[k], TUNE[k]); });
    gl.uniform1i(U.tDiffuse, 0);
    return {
      canvas: c,
      upload: function () {
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, txt);
      },
      setScan: function (n) { gl.uniform1f(U.scanlineCount, n); },
      draw: function (t) {
        gl.viewport(0, 0, c.width, c.height);
        gl.uniform1f(U.time, t);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      }
    };
  })();
  if (!GL) document.body.className = "nogl";

  var FPX = 26, LH = Math.round(26 * 1.3), PADX = 3, PADY = 2;
  function renderText(text) {
    lastText = text;
    if (!GL) { fallbackRender(text); return; }
    var lines = text.split("\n");
    tctx.font = FPX + 'px "Cascadia Mono","IBM Plex Mono",Consolas,Menlo,monospace';
    var cw = tctx.measureText("X").width;
    var cols = 34;
    lines.forEach(function (l) { if (l.length > cols) cols = l.length; });
    txt.width = Math.ceil((cols + PADX * 2) * cw);
    txt.height = (lines.length + PADY * 2) * LH;
    tctx.fillStyle = "#020503";
    tctx.fillRect(0, 0, txt.width, txt.height);
    tctx.font = FPX + 'px "Cascadia Mono","IBM Plex Mono",Consolas,Menlo,monospace';
    tctx.textBaseline = "top";
    tctx.shadowColor = "rgba(58,255,110,0.55)";
    tctx.shadowBlur = 5;
    tctx.fillStyle = "#49ff7c";
    lines.forEach(function (l, i) {
      tctx.fillText(l, PADX * cw, (i + PADY) * LH);
    });
    GL.upload();
    GL.setScan((lines.length + PADY * 2) * 2);
    console.log("[crt] lines=" + lines.length + " cols=" + cols +
                " cw=" + cw.toFixed(2) + " tex=" + txt.width + "x" + txt.height);
    layout();
  }
  function layout() {
    if (!GL || !txt.width) return;
    var crt = el("crt"), c = GL.canvas;
    var availW = crt.clientWidth - 8, availH = crt.clientHeight - 8;
    var aspect = txt.height / txt.width;
    var w = availW, h = Math.round(w * aspect);
    if (h > availH && availH > 60) { h = availH; w = Math.round(h / aspect); }
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    c.style.width = w + "px"; c.style.height = h + "px";
    c.width = Math.round(w * dpr); c.height = Math.round(h * dpr);
  }
  (function loop(t) {
    if (GL) GL.draw((t || 0) / 1000);
    requestAnimationFrame(loop);
  })(0);

  /* fallback: plain <pre> with autoscaled font */
  function fallbackRender(text) {
    var scr = el("screen"), ruler = el("ruler");
    scr.textContent = text;
    var cols = 34;
    text.split("\n").forEach(function (l) { if (l.length > cols) cols = l.length; });
    ruler.style.fontSize = "100px";
    ruler.textContent = Array(51).join("X");
    var cw = ruler.getBoundingClientRect().width / 50;
    ruler.textContent = "";
    var fs = Math.floor(100 * (el("crt").clientWidth - 20) / (cols * cw));
    scr.style.fontSize = Math.max(9, Math.min(fs, 30)) + "px";
  }
  var rsTimer = null;
  window.addEventListener("resize", function () {
    clearTimeout(rsTimer);
    rsTimer = setTimeout(function () { renderText(lastText); }, 120);
  });
  // the hotkey bar changes height when buttons arrive/wrap -- refit then too
  if (window.ResizeObserver) {
    new ResizeObserver(function () { layout(); }).observe(el("crt"));
  }

  /* ================= BBS wire protocol ================================ */
  function htmlToText(html) {
    var wrap = document.createElement("div");
    wrap.innerHTML = html;
    return wrap.textContent || "";
  }
  function setScreen(html) { renderText(htmlToText(html)); el("crt").scrollTop = 0; }
  function setKeys(rows) {
    var k = el("keys");
    k.innerHTML = "";
    (rows || []).forEach(function (row) {
      row.forEach(function (b) {
        var btn = document.createElement("button");
        btn.textContent = b.label;
        btn.onclick = function () { send({ data: b.data }); };
        k.appendChild(btn);
      });
    });
  }
  function send(obj) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
  }
  function connect() {
    ws = new WebSocket(wsurl);
    ws.onopen = function () {
      backoff = 1500;
      ws.send(JSON.stringify({ auth: (tg && tg.initData) || "", dev: dev }));
    };
    ws.onmessage = function (ev) {
      var m; try { m = JSON.parse(ev.data); } catch (e) { return; }
      if (m.error) { renderText("\n   NO CARRIER\n\n   " + m.error); setKeys([]); return; }
      if (m.screen) setScreen(m.screen);
      setKeys(m.buttons);
      requestAnimationFrame(function () { layout(); });
    };
    ws.onclose = function () {
      setKeys([]);
      renderText(lastText + "\n   +++ NO CARRIER (redialing...)");
      setTimeout(connect, backoff);
      backoff = Math.min(backoff * 2, 15000);
    };
  }
  function submit() {
    var box = el("in"), v = box.value.trim();
    if (!v) return;
    send({ text: v });
    box.value = "";
  }
  el("send").onclick = submit;
  el("in").addEventListener("keydown", function (e) {
    if (e.key === "Enter") { e.preventDefault(); submit(); }
  });
  document.addEventListener("keydown", function (e) {
    if (document.activeElement !== el("in") && e.key.length === 1) el("in").focus();
  });

  renderText("\n   ATDT ALTBBS\n   CONNECT 14400/ARQ\n\n   dialing the tower...\n");
  connect();
})();
</script>
</body>
</html>
